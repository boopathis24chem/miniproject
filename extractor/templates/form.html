<!DOCTYPE html>
<html>
<head>
    <title>Oil-Water Separation Analysis</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            text-align: center;
            padding: 40px;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 450px;
            margin: auto;
            box-shadow: 0px 10px 25px rgba(0,0,0,0.2);
        }

        label {
            display: block;
            margin-top: 10px;
            font-weight: 500;
            text-align: left;
        }

        input {
            width: 95%;
            padding: 8px;
            margin-top: 5px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            margin-top: 20px;
            padding: 10px 20px;
            border: none;
            background: #4facfe;
            color: white;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #00c6ff;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Oil-Water Separation Analysis</h2>

    <form method="POST" autocomplete="off">
        {% csrf_token %}

        <label>Flow Rate (L/min)</label>
        <input type="number" step="0.1" name="flow_rate" required>

        <label>RPM</label>
        <input type="number" name="rpm" required>

        <label>Initial Water Concentration (%)</label>
        <input type="number" step="0.1" name="initial_water" required>

        <label>Initial Oil Concentration (%)</label>
        <input type="number" step="0.1" name="initial_oil" required>

        <label>Final Water Concentration (%)</label>
        <input type="number" step="0.1" name="final_water" required>

        <label>Final Oil Concentration (%)</label>
        <input type="number" step="0.1" name="final_oil" required>

        <button type="submit">Calculate</button>
    </form>
</div>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Extractor Input</title>
</head>
<body>

<h2>Enter Extractor Data</h2>

<form method="POST" autocomplete="off">
    {% csrf_token %}

    <label>Flow Rate (L/min):</label><br>
    <input type="number" step="0.1" name="flow_rate" required><br><br>

    <label>RPM:</label><br>
    <input type="number" name="rpm" required><br><br>

    <label>Water Concentration (%):</label><br>
    <input type="number" step="0.1" name="water" required><br><br>

    <label>Acetone Concentration (%):</label><br>
    <input type="number" step="0.1" name="acetone" required><br><br>

    <button type="submit">Calculate</button>
</form>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Extractor Analysis</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            text-align: center;
            padding: 40px;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 400px;
            margin: auto;
            box-shadow: 0px 10px 25px rgba(0,0,0,0.2);
        }

        h2 {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-top: 10px;
            font-weight: 500;
        }

        input {
            width: 90%;
            padding: 8px;
            margin-top: 5px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            margin-top: 20px;
            padding: 10px 20px;
            border: none;
            background: #4facfe;
            color: white;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #00c6ff;
        }

        .title {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 14px;
            color: gray;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>

<div class="container">
    <div class="title">Centrifugal Extractor Analysis</div>
    <div class="subtitle">Enter parameters to calculate efficiency</div>

    <form method="POST">
        {% csrf_token %}

        <label>Flow Rate (L/min)</label>
        <input type="number" step="0.1" name="flow_rate" required>

        <label>RPM</label>
        <input type="number" name="rpm" required>

        <label>Water Concentration (%)</label>
        <input type="number" step="0.1" name="water" required>

        <label>Acetone Concentration (%)</label>
        <input type="number" step="0.1" name="acetone" required>

        <button type="submit">Calculate</button>
    </form>
</div>

</body>
</html>
